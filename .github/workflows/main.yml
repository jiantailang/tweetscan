name: Tweet Scanner

on:
  schedule:
    # 2日に1回、UTC時間の0時 (日本時間の午前9時) に実行
    - cron: '0 0 */2 * *'
  workflow_dispatch: # GitHubの画面から手動で「Run workflow」ボタンを押して実行できるようにする設定

permissions:
  contents: write # 実行結果(results.md)をリポジトリに保存するための権限

jobs:
  scan-tweets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results.md
          # 変更がある場合のみコミットとプッシュを行う
          if ! git diff --staged --quiet; then
            git commit -m "自動更新: 新しいツイートを記録"
            git push
          else
            echo "変更がないためコミットをスキップします"
          fi
